name: Monthly Schedule Reminder

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  create-reminder:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "schedule-update" \
            --color "0075ca" \
            --description "Monthly schedule verification reminder" \
            --repo "${{ github.repository }}" \
            2>/dev/null || true

      - name: Write issue body
        run: |
          cat > body.md <<'ENDOFBODY'
          ## Monthly schedule verification

          Check each series for newly announced races and update `data/schedule.json`.

          ### Series checklist
          - [ ] **Special Events** — https://www.iracing.com/special-events/
          - [ ] **Nurburgring Endurance Championship (NEC)** — check iRacing series page for new season rounds
          - [ ] **Global Endurance Tour (GET)** — check iRacing series page for S3 announcement
          - [ ] **GT Endurance Series** — check iRacing series page for S3 announcement
          - [ ] **IMSA Sportscar Endurance Challenge** — check iRacing series page for S3 announcement
          - [ ] **Gridfinder / iRTES** — https://gridfinder.com for next season dates

          ### How to update
          1. Edit `data/schedule.json`
          2. Add new race objects following the existing format
          3. Set `"confirmed": true` only when dates are officially announced
          4. Update `"last_updated"` to today's date
          5. Commit and push — GitHub Pages updates automatically

          ### Race object format
          ```json
          {
            "id": "series-name-year",
            "series": "special|nec|get|gte|imsa|gridfinder",
            "name": "Race Name",
            "track": "Track Name",
            "duration_h": 4,
            "confirmed": true,
            "car_classes": ["GT3", "GT4"],
            "notes": "Optional note",
            "slots": ["2026-MM-DDT07:00:00Z"]
          }
          ```

          Close this issue once `schedule.json` has been updated.
          ENDOFBODY

      - name: Create schedule update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MONTH=$(date -u +'%B %Y')
          gh issue create \
            --title "Schedule check -- $MONTH" \
            --label "schedule-update" \
            --body-file body.md \
            --repo "${{ github.repository }}"
